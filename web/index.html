<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="grow_glow">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Grow &amp; Glow</title>
  <link rel="manifest" href="manifest.json">
  <style>
    #barcode-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.85);
      flex-direction: column; align-items: center; justify-content: center;
    }
    #barcode-overlay.active { display: flex; }
    #barcode-video {
      width: min(90vw, 400px); border-radius: 16px;
      border: 3px solid #3DAA82;
    }
    #barcode-close {
      margin-top: 20px; padding: 12px 32px;
      background: #fff; border: none; border-radius: 12px;
      font-size: 16px; font-weight: 700; cursor: pointer; color: #2D2D2D;
    }
    #barcode-hint {
      color: #fff; margin-top: 12px; font-size: 14px; font-family: sans-serif;
    }
  </style>
</head>
<body>
  <div id="barcode-overlay">
    <video id="barcode-video" autoplay playsinline muted></video>
    <p id="barcode-hint">Inquadra il codice a barre</p>
    <button id="barcode-close" onclick="window.stopBarcodeScanner()">Annulla</button>
  </div>
  <script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
  <script src="barcode_scanner.js"></script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
